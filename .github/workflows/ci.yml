name: CI

# Temporarily disabled — re-enable by restoring push/PR triggers
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.20.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  package:
    name: Verify VSIX
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.20.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: xvfb-run -a pnpm --filter frostpi test:e2e
      - run: pnpm package:vsix
      - run: pnpm verify:vsix
      - run: node scripts/check-bundle-size.mjs
      - uses: actions/upload-artifact@v7
        with:
          name: FrostPi-VSIX
          path: artifacts/*.vsix
          if-no-files-found: error
