<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

      --vscode-font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

      --vscode-testing-iconPassed: #73c991;
      --vscode-progressBar-background: #4daafc;
      --vscode-badge-background: #256d85;
      --vscode-badge-foreground: #fff;
      --vscode-toolbar-hoverBackground: #2a2f39;
      --vscode-menu-background: #1b1e26;

      --vscode-menu-selectionForeground: #fff;
      --vscode-scrollbarSlider-background: #79797955;
      --vscode-scrollbarSlider-hoverBackground: #8a8a8a77;
      --vscode-editor-inactiveSelectionBackground: #3a405055;
      --vscode-editor-selectionBackground: #264f78;
    }

  <link rel="stylesheet" href="../../dist/webview/webview.css" />
  <script>
    const now = Date.now();
    const models = [
      { provider: "anthropic", id: "claude-opus-4-8", name: "Claude Opus 4.8", supportsImages: true, reasoning: true },
      { provider: "anthropic", id: "claude-sonnet-4-6", name: "Claude Sonnet 4.6", supportsImages: true, reasoning: true },
      { provider: "deepseek", id: "deepseek-v4-pro", name: "DeepSeek V4 Pro", reasoning: true },
      { provider: "deepseek", id: "deepseek-v4-flash", name: "DeepSeek V4 Flash", reasoning: true },
      { provider: "openai", id: "gpt-5.6-sol", name: "GPT-5.6-Sol", supportsImages: true, reasoning: true },
      { provider: "openai", id: "gpt-5.6-terra", name: "GPT-5.6-Terra", supportsImages: true, reasoning: true },
    ];
    const workspace = {
      workspaceName: "frostpi",
      workspacePath: "/workspace/frostpi",
      activeSessionId: "session-1",
      piAvailable: true,
      sessions: [{ id: "session-1", title: "Refine UI density", cwd: "/workspace/frostpi", status: "ready", isActive: true, modelLabel: "Claude Opus 4.8", thinkingLevel: "high", updatedAt: now }],
      activeSession: {
        id: "session-1", title: "Refine UI density", cwd: "/workspace/frostpi", status: "ready", isStreaming: false, isCompacting: false,
        model: models[0], thinkingLevel: "high", availableModels: models,
        commands: [
          { name: "inspect", description: "Inspect the current environment", source: "extension" },
          { name: "list-subagents", description: "List configured subagents", source: "extension" },
          { name: "prompt#code-review", description: "Review the codebase", source: "prompt" },
          { name: "preset", description: "Select an agent preset", source: "extension" }
        ],
        attachmentLimits: { maxImageBytes: 10485760, maxImages: 12 },
        networkProxy: { mode: "custom", label: "Custom proxy", pendingLabel: "Direct", restartRequired: true },
        turns: [
          { id: "turn-1", status: "completed", startedAt: now - 9000, endedAt: now - 4000,
            userMessage: { id: "u1", role: "user", status: "complete", timestamp: now - 9000, blocks: [{ type: "text", text: "Review the interaction density and fix the composer." }] },
            activities: [
              { id: "r1", type: "reasoning", text: "I need to verify completion behavior, layout constraints, and model menu state.", status: "complete", timestamp: now - 8000 },
              { id: "t1", type: "tool", timestamp: now - 7000, tool: { id: "tool-1", name: "bash", label: "pnpm typecheck && pnpm test", status: "complete", args: { command: "pnpm typecheck && pnpm test" }, output: "45 tests passed", isError: false, startedAt: now - 7000, endedAt: now - 6000 } },
              { id: "a1", type: "response", status: "complete", timestamp: now - 5000, blocks: [{ type: "text", text: "The UI is ready for focused validation." }] }
            ]
          }
        ],
        notices: [], pendingExtensionUi: [], extensionStatuses: [{ key: "preset", text: "agentic-coding" }], extensionWidgets: [],
        stats: { userMessages: 1, assistantMessages: 1, toolCalls: 1, toolResults: 1, totalMessages: 4, tokens: { input: 12400, output: 2800, cacheRead: 8100, cacheWrite: 0, total: 23300 }, cost: 0.082, contextUsage: { tokens: 23300, contextWindow: 200000, percent: 11.65 } },
        updatedAt: now
      }
    };
    window.__frostpiMessages = [];
    window.acquireVsCodeApi = () => ({
      postMessage(message) {
        window.__frostpiMessages.push(message);
        if (message.type === "ready") setTimeout(() => window.postMessage({ bridgeVersion: 2, type: "snapshot", workspace }, "*"), 20);
        if (message.type === "searchWorkspaceFiles") setTimeout(() => window.postMessage({ bridgeVersion: 2, type: "workspaceFileSuggestions", requestId: message.requestId, items: [
          { path: "src/extension/sessions/SessionRuntime.ts", name: "SessionRuntime.ts", directory: "src/extension/sessions", score: 900 },
          { path: "src/webview/features/composer/PromptEditor.svelte", name: "PromptEditor.svelte", directory: "src/webview/features/composer", score: 800 },
          { path: "docs/design/ui-spec.md", name: "ui-spec.md", directory: "docs/design", score: 700 }
        ] }, "*"), 80);
      },
      getState() { return undefined; },
      setState() {}
    });
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="../../dist/webview/webview.js"></script>
</body>
</html>
